project_id = "nrwhvcyxylsiwsbvlmwn"

# El agente se llama de dos formas: manual (con JWT del usuario, validado
# adentro) y por cron (sin JWT, autenticado con x-agent-secret). Por eso
# desactivamos la verificación automática de JWT y la manejamos en el código.
[functions.run-agent]
verify_jwt = false

# fetch-news la llama el cron (sin JWT) y el frontend. Solo lee RSS públicos
# y escribe con service role; no maneja datos por-usuario en la request.
[functions.fetch-news]
verify_jwt = false

# reoptimize la llama el cron (sin JWT). Autenticada por {mode:"cron"} adentro.
[functions.reoptimize]
verify_jwt = false
